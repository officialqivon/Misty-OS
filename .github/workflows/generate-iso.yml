name: Generate MistyOS ISO
on:
  workflow_dispatch:
jobs:
  build-iso:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Build ISO
        uses: jasonn3/build-container-installer@v1.4.0
        id: build
        with:
          arch: x86_64
          image_name: mistyos
          image_repo: ghcr.io/officialqivon
          image_tag: latest
          version: 43 # Change to 40 if your recipe is based on Fedora 40
          variant: Kinoite # Use 'Silverblue' instead if you are building a GNOME desktop
          iso_name: MistyOS.iso
          display_name: "MistyOS" # This forces the boot menu to show "MistyOS"
          enable_live_workstation: true # This gives you the Live Desktop
          enable_moby_workaround: true # Prevents crashes on large 7GB+ images

      - name: Upload ISO as artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build.outputs.iso_name }}
          path: |
            ${{ steps.build.outputs.iso_path }}/${{ steps.build.outputs.iso_name }}
            ${{ steps.build.outputs.iso_path }}/${{ steps.build.outputs.iso_name }}-CHECKSUM
