name: Generate MistyOS ISO
on:
  workflow_dispatch: # This adds the "Run Workflow" button in GitHub Actions
jobs:
  build-iso:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Build ISO
        uses: blue-build/mk-isogen@v1
        with:
          image-name: mistyos
          image-tag: latest
          registry-operator: officialqivon
          iso-live-mode: true
