name: Generate MistyOS ISO
on:
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    permissions:
      contents: write # THE FIX: Changed from 'read' to 'write' for the release
      packages: write
      id-token: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Build ISO
        uses: jasonn3/build-container-installer@v1.4.0
        id: build
        with:
          arch: x86_64
          image_name: mistyos
          image_repo: ghcr.io/officialqivon
          image_tag: latest
          version: 43
          variant: Kinoite
          iso_name: MistyOS.iso
          display_name: "MistyOS"
          enable_live_workstation: true
          enable_moby_workaround: true

      - name: Upload ISO as artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: MistyOS-Artifact # Giving it a simple name helps for debugging
          path: |
            ${{ steps.build.outputs.iso_path }}/${{ steps.build.outputs.iso_name }}
            ${{ steps.build.outputs.iso_path }}/${{ steps.build.outputs.iso_name }}-CHECKSUM

      - name: Create Release (Large File Support)
        run: |
          # Create the release first (it's okay if it already exists)
          gh release create v1.0.${{ github.run_number }} \
            --title "MistyOS Build ${{ github.run_number }}" \
            --notes "Automated build of MistyOS" \
            --repo ${{ github.repository }} || echo "Release already exists"

          # Upload the heavy lifting files
          echo "Uploading ISO... this will take a while."
          gh release upload v1.0.${{ github.run_number }} \
            "${{ steps.build.outputs.iso_path }}/${{ steps.build.outputs.iso_name }}" \
            "${{ steps.build.outputs.iso_path }}/${{ steps.build.outputs.iso_name }}-CHECKSUM" \
            --repo ${{ github.repository }} --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
