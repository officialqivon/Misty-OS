name: Generate MistyOS ISO
on:
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Build ISO
        uses: jasonn3/build-container-installer@main
        id: build
        with:
          arch: x86_64
          image_name: mistyos
          image_repo: ghcr.io/officialqivon
          image_tag: latest
          version: 43
          variant: Kinoite   # ← Valid variant. Gives you KDE + pulls webui-capable installer
          iso_name: MistyOS.iso
          webui: true        # ← THIS is the actual input to enable Anaconda Web UI

      - name: Upload ISO as artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: MistyOS-Artifact
          path: |
            ${{ steps.build.outputs.iso_path }}/${{ steps.build.outputs.iso_name }}
            ${{ steps.build.outputs.iso_path }}/${{ steps.build.outputs.iso_name }}-CHECKSUM

      - name: Split and Upload
        run: |
          gh release create v1.0.${{ github.run_number }} \
            --title "MistyOS Build ${{ github.run_number }}" \
            --notes "Download all parts and run 'cat MistyOS.iso.part* > MistyOS.iso' to combine." \
            --repo ${{ github.repository }} || echo "Exists"

          split -b 2000M \
            "${{ steps.build.outputs.iso_path }}/${{ steps.build.outputs.iso_name }}" \
            MistyOS.iso.part

          gh release upload v1.0.${{ github.run_number }} MistyOS.iso.part* \
            --repo ${{ github.repository }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
